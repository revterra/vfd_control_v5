<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a237e"/>
  <!-- Flywheel outer ring -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#90caf9" stroke-width="6"/>
  <!-- Flywheel inner ring -->
  <circle cx="64" cy="64" r="30" fill="none" stroke="#64b5f6" stroke-width="3"/>
  <!-- Hub -->
  <circle cx="64" cy="64" r="12" fill="#42a5f5"/>
  <circle cx="64" cy="64" r="6" fill="#1a237e"/>
  <!-- Spokes -->
  <line x1="64" y1="16" x2="64" y2="34" stroke="#90caf9" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="94" x2="64" y2="112" stroke="#90caf9" stroke-width="4" stroke-linecap="round"/>
  <line x1="16" y1="64" x2="34" y2="64" stroke="#90caf9" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="64" x2="112" y2="64" stroke="#90caf9" stroke-width="4" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="30" y1="30" x2="43" y2="43" stroke="#90caf9" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="98" x2="85" y2="85" stroke="#90caf9" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="30" x2="85" y2="43" stroke="#90caf9" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="98" x2="43" y2="85" stroke="#90caf9" stroke-width="3" stroke-linecap="round"/>
  <!-- Motion arc (rotation indicator) -->
  <path d="M 95 28 A 48 48 0 0 1 108 52" fill="none" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <polygon points="109,54 104,46 114,48" fill="#4caf50"/>
  <!-- "V2" label -->
  <text x="64" y="126" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">V2</text>
</svg>
